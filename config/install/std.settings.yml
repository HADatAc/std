std_home: 0
study_search_ontologies:
  uberon:
    title: 'Anatomical Category (UBERON)'
    token_regexes:
      - '/\bUBERON[:_]\d{3,}\b/i'
    uri_template: 'UBERON:%s'
    uri_keywords:
      - 'uberon'
  ncit:
    title: 'Procedure Type (NCIT)'
    token_regexes:
      - '/\bNCIT[:_ ]?C?\d{2,}\b/i'
    uri_template: 'NCIT:C%s'
    uri_keywords:
      - 'ncit'
