services:
  std.custom_access_check:
    class: Drupal\std\Access\CustomAccessCheck
    arguments: ['@current_user']
    tags:
      - { name: access_check, applies_to: _custom_access_check }
  std_operations.ingest_operation:
    class: Drupal\std\IngestOperation
  std.route_subscriber:
    class: Drupal\std\EventSubscriber\RouteSubscriber
    arguments: ['@config.factory']
    tags:
        - { name: event_subscriber }
  std.study_variable_search:
    class: Drupal\std\Service\StudyVariableSearchService
    arguments: ['@rep.api_connector', '@file_system']
  
  # Persistent cache factory that survives 'drush cr'
  cache.backend.std_persistent:
    class: Drupal\std\Cache\PersistentCacheBackendFactory
    arguments: ['@database', '@cache_tags.invalidator.checksum']
  
  # Study search cache bin using persistent backend
  cache.std_study_search:
    class: Drupal\Core\Cache\CacheBackendInterface
    tags:
      - { name: cache.bin }
    factory: cache.backend.std_persistent:get
    arguments: [std_study_search]
